<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version Control Continued</title>
</head>
<body>
    <main>
        <section>
            <section>
            <h2>Commands</h2>
            <dl>
                <dt><code>git reset &lt;file&gt;</code></dt>
                <dd>This is used to remove a specified file from the staging area</dd>
                <dt><code>git revert &lt;commit&gt;</code></dt>
                <dd>This is used to create a new commit that undoes the changes made in a specified commit</dd>
            </dl>
        </section>
    </main>
</body>
</html>
