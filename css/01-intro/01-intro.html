<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./01-style.css" />
    <title>Document</title>
    <style>
      /* selector {
        property: value;
      } */

      /* Element selector */
      h1 {
        color: red;
      }

      /* Id Selector */
      #blueText {
        color: blue;
      }

      /* class selector */
      .greenText {
        color: green;
      }
    </style>
  </head>
  <body>
    <section>
      <h1>Red Text</h1>
      <p id="blueText">This is Red</p>
      <p class="greenText">This is green</p>
      <p class="greenText">This is another</p>
    </section>

    <section>
      <h3>CSS Inline</h3>
      <p style="background-color: red">this is a paragraph</p>
    </section>

    <hr />
    <section>
      <h2>CSS External styles</h2>
      <h6 id="small-heading">This is a small heading</h6>
    </section>
  </body>
</html>
