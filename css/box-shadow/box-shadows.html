<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="box-shadows.css" >
    <title>box shadow</title>
</head>
<body>
    <main>
        <h1>Advanced styling effects</h1>
        <h3>Simple box shadow</h3>
        <section>
        <article class="simple">
            <p>
                <strong>Warning</strong>: The thermostat on the cosmic transcender has reached a critical level.
            </p>
        </article>
        </section>

        <br>
        <h3>Multiple box shadow</h3>
        <section>
        <article class="multiple">
            <p>
                <strong>Warning</strong>: The thermostat on the cosmic transcender has reached a critical level.
            </p>
        </article>
        </section>
<br>
<h3>Buttons</h3>
        <button>Press Me!</button>

        <h3>Filter</h3>
        <div class="wrapper">
  <div class="box">
    <img
      alt="balloons"
      class="blur"
      src="https://mdn.github.io/shared-assets/images/examples/balloons.jpg" />
  </div>

  <div class="box">
    <img
      alt="balloons"
      class="grayscale"
      src="https://mdn.github.io/shared-assets/images/examples/balloons.jpg" />
  </div>
</div>




    </main>
</body>
</html>
