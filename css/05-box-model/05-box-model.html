<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    </script> -->
    <title>Box Model</title>
</head>
<body>
    <main>
        <section>
            <h3>Box Sizing Examples</h3>
            <div>
                <div class="box-1">box 1</div>
                <div class="box-2">box 2</div>
                <div class="box-3">box 3</div>
            </div>
        </section>
        <hr>
        <section>
            <h3>Display Types</h3>
            <div class="display">
                <div class="cube"></div>
                <div class="cube"></div>
                <div class="cube"></div>
            </div>
            <div class="block-anchor">
                <a href="">This is a link</a>
                <a href="">this is another link</a>
            </div>
            <p>This is para 1</p>
            <p>This is para 2</p>

            <p class="disappear">Invisble paragraph</p>
        </section>

        <section>
            <h3>Working with margins</h3>
            <div class="margin-square">
                <div class="margin-square-1">Margin square 1</div>
            </div>

            <div class="margin-shorthand">
                <div class="">Margin Shorthand</div>
            </div>

            <div class="margin-negative">
                <h5>Negative Margin Example</h5>
                <div class="one"></div>
                <div class="two"></div>
            </div>
        </section>

        <section>
            <h3>Borders</h3>
            <div class="border">
                <div class="one"></div>
            </div>
        </section>
    </main>
</body>
</html>
