<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        form > fieldset {
            display: flex;
            flex-direction: column;
            gap: 2;
        }
    </style>
    <title>form controls</title>
  </head>
  <body>
    <main>
        <h1>HTML Forms</h1>

      <form action="">
        <!-- form controls -->
        <fieldset>
          <legend>Form Controls</legend>

          <label for="fullName"
            >Full Name <input type="text" id="fullName" />
            <!-- pascal case text input -->
          </label>

          <label for="CurrentPassword"
            >Current Password
            <input type="password" id="CurrentPassword" />
          </label>

          <label for="">Age
            <input type="number" id="age" />
          </label>

          <br /><br />
          <label for="email"
            >Email
            <input type="email" id="email" />
          </label>

          <label for="file"
            >Upload a file
            <input type="file" id="file" />
          </label>
          <label for="color"
            >Choose a color
            <input type="color" id="color" />
          </label>

          <label for="date"
            >Select a date
            <input type="date" id="date" />
          </label>
          <label for="datetime"
            >Select a date and time
            <input type="datetime-local" id="datetime" />
          </label>
          <label for="range"
            >Select a range
            <input type="range" id="range" />
          </label>
          <label for="search"
            >Search
            <input type="search" id="search" />
          </label>
          <label for="tel"
            >Phone Number
            <input type="tel" id="tel" />
          </label>
          <label for="url"
            >Website URL
            <input type="url" id="url" />
          </label>
          <label for="week"
            >Select a week
            <input type="week" id="week" />
          </label>
          <label for="month"
            >Select a month
            <input type="month" id="month" />
          </label>

          <label for="remember">
            <input type="checkbox" id="remember" />
            I Agree to terms and conditions
          </label>

          <label for="male">
            <input type="radio" id="male" name="gender" />
            Male
          </label>
          <label for="female">
            <input type="radio" id="female" name="gender" />
            Female
          </label>

          <label for="text">
            <input type="text" id="text" />
            text
          </label>

          <label for="file">
            <input type="file" id="file" />
            Upload a file
          </label>

          <label for="date">
            <input type="date" id="date" />
            Select a date
          </label>
          <label for="datetime">
            <input type="datetime-local" id="datetime" />
            Select a date and time
          </label>

          <label for="search">
            <input type="search" id="search" />
            Search
          </label>

          <label for="tel">
            <input type="tel" id="tel" />
            Phone Number
          </label>

          <label for="url">
            <input type="url" id="url" />
            Website URL
          </label>

          <label for="week">
            <input type="week" id="week" />
            Select a week
          </label>

          <label for="month">
            <input type="month" id="month" />
            Select a month
          </label>
          <label>
            Reset
            <input type="reset" />
          </label>

          <input type="submit" value="Apply" />
        </fieldset>

        <form action="">
          <fieldset>
            <legend>Form Input attributes</legend>
            
            <label for=""
              >Name Attribute
              <input type="text" name="firstName" />
            </label>

            <br />
            <label for=""
              >First name
              <input type="text" placeholder="First name" />
            </label>

            <label for=""
              >Required Input
              <input type="text" required />
            </label>

            <br />
            <label for=""
              >Min and Max Length
              <input type="text" minlength="3" maxlength="10" />
            </label>

            <br />
            <label for="readonly"
              >Read Only Input
              <input type="text" readonly value="Read only input" />
            </label>

            <label for=""
              >disabled
              <input type="text" disabled />
            </label>

            <label for=""
              >pattern
              <input type="text" pattern="[a-z]+" />
            </label>

            <label for="step"
              >Step
              <input type="number" step="20" />
            </label>
            <br />
            <label for="">
              <input type="file" multiple />
            </label>
            <br />
            <label for="">
              Accept
              <input
                type="file"
                accept="image/png,image/jpg,image/jpeg,application/pdf"
              />
            </label>
            <br />
            <button type="submit">Submit</button>
          </fieldset>
        </form>

        <form action="">
          <fieldset>
            <legend>Other Form Elements</legend>

            <label for="">
              Explain reason for resuming late
              <textarea
                name=""
                id=""
                rows="4"
                maxlength="100"
                placeholder="Explain here"
              ></textarea>
            </label>
            <br />

            <label for=""
              >Select Input
              <select name="" id="">
                <option value="salmon">Salmon</option>
                <option value="titus">Titus</option>
                <option value="catfish">Catfish</option>
              </select>
            </label>
            <br>

            <label for="places">Places  </label>
            <input list="listPlaces" type="text" name="places" />

                <datalist id="listPlaces">
                    <option value="lagos">
                    <option value="abuja">
                    <option value="port harcourt">
                </datalist>
           
          </fieldset>
        </form>
      
    </main>
  </body>
</html>
