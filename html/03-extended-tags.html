<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extended HTML Tags</title>
  </head>
  <body>
    <main>
      <p>
        In this section, we explored some of the extended HTML tags that can be
        used to enhance the functionality and presentation of your web pages.
      </p>
      <button type="button">Click Me</button>
      <figure>
        <img src="offline.png" alt="offline" width="350px" height="300px" />
        <figcaption>Offline Image</figcaption>
      </figure>
      <fieldset>
        <legend>A group of related options</legend>
        <button type="button">Option 1</button>
        <button type="button">Option 2</button>
        <button type="button">Option 3</button>
      </fieldset>
      <dialog open>Accept offer</dialog>

      <br /><br /><br />

      <section>
        <h2>Character entities</h2>
        &copy; &gt; &lt; &amp;
        <br /><br />
        &lt;h2&gt;This is a heading&lt;/h2&gt;
      </section>
    </main>
  </body>
</html>
