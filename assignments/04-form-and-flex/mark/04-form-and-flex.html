<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="04-form-and-flex.css">
    <title>form and flex</title>
</head>
<body>
    <main>
        <section>
            <div class="container">
                <div class="leftside">
                    <h2>Bring Your Music Along</h2>
                    <p class="one">try unlimited</p>
                    <p class="two">$9.99/month</p>
                </div>
                <div class="rightside">
                    <form action="">
                        <div class="headings">
                            <h1>Registration Form</h1>
                        </div>
                        <div class="inputs">
                            <label for="firstName">
                            <span>Full Name:</span>
                            <input type="text" id="fullName" name="fullName">
                            </label>
                    
                            <label for="email">
                            <span>Your Email:</span>
                            <input type="email" id="email" name="email">
                            </label>
                            
                            <label for="password">
                            <span>Password:</span>
                            <input type="password" id="password" name="password">
                            </label>
                            
                            <label for="confirmPassword">
                            <span>Confirm Password:</span>
                            <input type="password" id="confirmPassword" name="confirmPassword">
                            </label>
                            
                
                        <div class="form-footer">
                            <input type="checkbox" id="form-footer" name="agree">
                            <span>By signing up you agree to the <a href="#">Play terms of service</a></span>
                            </label>
                        </div>
                         <button>Register</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    
</body>
</html>
