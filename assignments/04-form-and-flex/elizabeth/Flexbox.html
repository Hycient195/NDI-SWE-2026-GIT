<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Flexbox.css">
    <title>Flexbox Assignment</title>
</head>
<body>
    <main>
        <div class="container">
            <!---Left hand side -->
            <div class="bg">
            <div class="overlay">
             <h5>Bring Your Music Along</h5>
             <p>try Unlimited</p>
            <div class="price">$9.99 <span>/Month</span></div>
            </div>
            </div>
            

        <!----Registration Form-->
        <div class="form-container">
            <form action="">
                <div class="heading">
                 <h3>Registration Form</h3>
                </div>
             
              <div class="input-group"></div>
              <label for="Full Name">
              <span>Full Name</span>
              <input type="text" id="FullName" placeholder="Fubel Elizabeth"></label>
               <label for="Email">
                <span>Your Email</span>
              <input type="email" id="Youremail" name="YourPassword">
              </label>
              <label for="password">
                <span>Password</span>
               <input type="password" id="Password" name="Password">
               </label>
               <label for="password">
                <span>Confirm Password</span>
                <input type="password" id="ConfirmPassword" name="ConfirmPassword">
                </label>
                <label class="agree" for="agree">
                <input type="checkbox" id="agree" name="agree">
                By signing up you agree to
                <span> <a href="#">Play Term of Service</a> </span>
               </label>
                <button type="submit" class="Register">Register</button> 
            </form>
             </div>   
            </div>

    </main>
</body>
</html>
