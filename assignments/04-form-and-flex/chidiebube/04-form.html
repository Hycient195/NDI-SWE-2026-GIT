<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="04-form.css">
   <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Form Assignment</title>
</head>
<body>
    <main>
        <section class="form-container">

            <!-- image section -->
            <div class="left-side">
                <h1>Bring Your Music Along</h1>
                <p>try Unlimited</p>
                <h2>$9.99 <span> / Month</span></h2>
            </div>

            <!-- form section -->
             <form action="">
                <div class="right-side-header">
                <h1>Registration Form</h1>
                <p>It's free and only takes a minute</p>
                </div>

                <div class="inputs">
                    <label class="input-box" for="fullName">
                    <span>Full Name:</span>
                    <input type="text" name="fullName" class="placeholder" placeholder="Ex. Chidiebube Williams" required>
                     <i class="fa-solid fa-user"></i>
                    </label>

                    <label for="email">
                        <span>Your Email:</span>
                    <input type="email" name="email" required>
                    </label>

                    <label class="input-box" for="password">
                        <span>Password:</span>
                    <input type="password" name="password" required>
                    <i class="fa-solid fa-lock"></i>
                    </label>

                    <label class="input-box" for="confirmPassword">
                    <span>Confirm Password:</span>
                    <input type="password" name="confirmPassword" required>
                    <i class="fa-solid fa-lock"></i>
                    </label>

                    <label class="agree">
                    <input type="checkbox">
                    <span>By signing up, I agree to the <a href="">Play Terms of Service</a></span>
                    </label>
                </div>

                <div class="form-footer">
                    <button>Register</button>
                </div>
             </form>
        </section>
    </main>
</body>
</html>
